name: etl diario

on:
  schedule:
    - cron: "47 5 * * *" # 7:47 en españa (verano);
    - cron: "47 10 * * *" # 12:47, respaldo
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña actions

permissions:
  contents: write

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python etl/fetch_prices.py

      - name: commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs/data
          git diff --cached --quiet || git commit -m "actualizar datos $(date -u +%F)"
          git push
